services:
  - type: web
    name: ubo-ownership-tree-resolver-api
    runtime: node
    rootDir: ""
    buildCommand: cd backend && pnpm install
    startCommand: cd backend && node --import tsx/esm src/index.ts
    plan: free
    region: oregon
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
